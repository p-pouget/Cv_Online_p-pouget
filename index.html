<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pierre Pouget | Développeur Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body
    class="bg-[#f5f5f5] h-screen w-screen overflow-hidden flex items-center justify-center font-['Inter'] antialiased">

    <div id="your-element-selector" class="fixed inset-0 w-full h-full"></div>

    <main class="relative z-10 w-full max-w-sm px-4">
        <div class="bg-transparent border-l-2 border-black p-8 text-left transition-all duration-500">

            <header class="mb-12">
                <h1 class="text-5xl font-black tracking-tighter text-black uppercase leading-none mb-2">
                    Pierre<br>Pouget
                </h1>
                <div class="flex items-center gap-2">
                    <span class="h-[2px] w-8 bg-[#6c5ce7]"></span>
                    <p class="text-xs uppercase tracking-[0.4em] font-bold text-black/50">
                        Full-Stack Dev
                    </p>
                </div>
            </header>

            <div class="space-y-4 mb-12">
                <a href="https://github.com/p-pouget"
                    class="group flex items-end justify-between border-b border-black/10 pb-2 hover:border-black transition-colors">
                    <span class="text-sm uppercase tracking-widest font-black text-black/70 group-hover:text-black">01.
                        VIEW PROJECTS</span>
                    <span class="text-sm font-bold text-black/50 group-hover:text-black">GitHub</span>
                </a>
                <a href="https://prisme-et-perspective.vercel.app/"
                    class="group flex items-end justify-between border-b border-black/10 pb-2 hover:border-black transition-colors">
                    <span class="text-sm uppercase tracking-widest font-black text-black/70 group-hover:text-black">02.
                        VIEW LAB</span>
                    <span class="text-sm font-bold text-black/50 group-hover:text-black">Blog</span>
                </a>
            </div>

            <div class="mb-12 space-y-1 text-sm font-bold tracking-tight text-black">
                <p class="opacity-60">Pau - france</p>
                <p class="hover:text-[#6c5ce7] transition-colors cursor-pointer">pierre.pouget01@gmail.com</p>
                <p class="opacity-60">06 31 04 34 31</p>
            </div>

            <a href="cv-pierre-pouget-dev-gen.pdf" target="_blank"
                class="inline-block w-full py-5 bg-black text-white text-xs font-black uppercase tracking-[0.3em] text-center hover:bg-[#6c5ce7] transition-all duration-300 rounded-lg">
                Full Curriculum
            </a>

            <footer class="mt-10 flex gap-6 text-xs font-black uppercase tracking-widest text-black/50">
                <a href="https://www.linkedin.com/in/pierre-pouget-53b3743bb/"
                    class="hover:text-black transition-colors">Linkedin.</a>
            </footer>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>

    <script>
        VANTA.BIRDS({
            el: "#your-element-selector",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            backgroundColor: 0xf5f5f5,
            color1: 0x6c5ce7,
            color2: 0xa29bfe,
            birdSize: 3.10,
            wingSpan: 15.00,
            speedLimit: 3.00,
            cohesion: 82.00
        })
    </script>

</body>

</html>
